services:
  postgres:
    image: postgres:18-alpine
    profiles: [postgres, full, test]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blueprint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=all", "-p", "5432"]

  redis:
    image: redis:8-alpine
    profiles: [redis, full, test]
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.7.0
    profiles: [kafka, full, test]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  akhq:
    image: tchiotludo/akhq:latest
    profiles: [kafka, full]
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            single-broker:
              properties:
                bootstrap.servers: "kafka:9092"
    ports:
      - "8080:8080"
    depends_on:
      - kafka

  jaeger:
    image: jaegertracing/all-in-one:1.35
    profiles: [jaeger, full]
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP
    expose:
      - "16685"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_GRPC_TLS_ENABLED: "false"
      SPAN_STORAGE_TYPE: "memory"
    command: ["--log-level=info"]

  minio:
    image: minio/minio:latest
    profiles: [minio, full, test]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
